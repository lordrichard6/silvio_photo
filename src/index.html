      {
        "@type": "Question",

          "@type": "Answer",

        }
      },
      {
        "@type": "Question",
        "name": "Quanto tempo demora a entregar as fotografias?",

          "@type": "Answer",

      },

        "@type": "Question",
        "name": "Tem licença para operar drone?",
