<nav class="navbar navbar-expand-lg navbar-dark fixed-top" [class.scrolled]="isScrolled">
  <div class="container">
    <a class="navbar-brand" href="#home" (click)="scrollTo('home'); $event.preventDefault()">
      <img src="/logo_top.webp" alt="Silvio Valente Fotografia" class="navbar-logo"
           width="920" height="444">
    </a>

    <button class="navbar-toggler" type="button" [attr.aria-expanded]="isMobileMenuOpen" aria-controls="navbarNav"
      aria-label="Toggle navigation" (click)="toggleMobileMenu()">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="isMobileMenuOpen" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'home'"
            href="#home" (click)="scrollTo('home'); $event.preventDefault()">Início</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'about'"
            href="#about" (click)="scrollTo('about'); $event.preventDefault()">Sobre</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/portfolio" routerLinkActive="active"
            (click)="closeMobileMenu()">Portefólio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'services'"
            href="#services" (click)="scrollTo('services'); $event.preventDefault()">Serviços</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'contact'"
            href="#contact" (click)="scrollTo('contact'); $event.preventDefault()">Contacto</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
